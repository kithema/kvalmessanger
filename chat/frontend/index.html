<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Say - Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Страница входа/регистрации -->
        <div id="auth-page" class="page active">
            <div class="auth-container">
                <h1>2Say</h1>
                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Вход</button>
                    <button class="tab-btn" data-tab="register">Регистрация</button>
                </div>
                
                <form id="login-form" class="auth-form active">
                    <input type="text" id="login-alias" placeholder="Alias" required>
                    <input type="password" id="login-password" placeholder="Пароль" required>
                    <button type="submit">Войти</button>
                    <div id="login-error" class="error-message"></div>
                </form>

                <form id="register-form" class="auth-form">
                    <input type="text" id="reg-alias" placeholder="Alias (мин. 4 символа)" required>
                    <input type="text" id="reg-name" placeholder="Имя">
                    <input type="password" id="reg-password" placeholder="Пароль (мин. 6 символов)" required>
                    <button type="submit">Зарегистрироваться</button>
                    <div id="reg-error" class="error-message"></div>
                </form>
            </div>
        </div>

        <!-- Основное приложение -->
        <div id="chat-page" class="page">
            <div class="chat-container">
                <!-- Боковая панель -->
                <div class="sidebar">
                    <div class="sidebar-header">
                        <h2>Чаты</h2>
                        <button id="new-chat-btn">+</button>
                    </div>
                    <div class="user-info">
                        <div class="user-info-left">
                            <span id="user-alias" class="user-alias">@пользователь</span>
                            <span id="user-name" class="user-name-display"></span>
                        </div>
                        <div class="user-info-right">
                            <button id="profile-btn" class="icon-btn" title="Профиль">👤</button>
                            <button id="logout-btn" class="icon-btn logout-btn" title="Выйти">🚪</button>
                        </div>
                    </div>
                    <div id="chat-list" class="chat-list">
                        <!-- Список чатов -->
                    </div>
                </div>

                <!-- Основная область чата -->
                <div class="chat-main">
                    <div id="chat-header" class="chat-header">
                        <div class="chat-header-info">
                            <div class="chat-avatar">
                                <span id="chat-avatar-text">👥</span>
                            </div>
                            <div class="chat-header-details">
                                <h3 id="current-chat-name">Выберите чат</h3>
                                <span id="chat-participants-info" class="chat-participants-info"></span>
                            </div>
                        </div>
                        <div class="chat-header-actions">
                            <button id="chat-info-btn" class="icon-btn" title="Информация о чате">ℹ️</button>
                        </div>
                    </div>
                    <div id="messages-container" class="messages-container">
                        <div class="empty-chat-message">
                            <span>💬</span>
                            <p>Выберите чат, чтобы начать общение</p>
                        </div>
                    </div>
                    <div class="message-input-container">
                        <textarea id="message-input" placeholder="Введите сообщение..." rows="2"></textarea>
                        <button id="send-btn">Отправить</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модалка создания чата -->
        <div id="new-chat-modal" class="modal">
            <div class="modal-content">
                <span class="modal-close">&times;</span>
                <h2>Создать чат</h2>
                <form id="new-chat-form">
                    <input type="text" id="chat-name" placeholder="Название чата (опционально)">
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="chat-is-group"> Групповой чат
                        </label>
                    </div>
                    <div id="participants-container">
                        <label>Участники (alias через запятую):</label>
                        <input type="text" id="chat-participants" placeholder="Например: john, mary, bob">
                        <small class="hint">Введите alias участников через запятую</small>
                    </div>
                    <button type="submit">Создать</button>
                </form>
            </div>
        </div>

        <!-- Модалка профиля -->
        <div id="profile-modal" class="modal">
            <div class="modal-content">
                <span class="modal-close" id="profile-modal-close">&times;</span>
                <h2>Мой профиль</h2>
                <form id="profile-form">
                    <div class="profile-field">
                        <label>Alias:</label>
                        <input type="text" id="profile-alias" disabled>
                    </div>
                    <div class="profile-field">
                        <label>Имя:</label>
                        <input type="text" id="profile-name" placeholder="Ваше имя">
                    </div>
                    <div class="profile-field">
                        <label>Новый пароль:</label>
                        <input type="password" id="profile-password" placeholder="Оставьте пустым, если не меняете">
                    </div>
                    <button type="submit">Сохранить изменения</button>
                    <div id="profile-error" class="error-message"></div>
                    <div id="profile-success" class="success-message"></div>
                </form>
            </div>
        </div>

        <!-- Модалка информации о чате -->
        <div id="chat-info-modal" class="modal">
            <div class="modal-content">
                <span class="modal-close" id="chat-info-modal-close">&times;</span>
                <h2 id="chat-info-title">Информация о чате</h2>
                <div id="chat-info-content">
                    <div class="chat-info-field">
                        <label>Название:</label>
                        <span id="info-chat-name"></span>
                    </div>
                    <div class="chat-info-field">
                        <label>Тип:</label>
                        <span id="info-chat-type"></span>
                    </div>
                    <div class="chat-info-field">
                        <label>Участники:</label>
                        <div id="info-participants-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
